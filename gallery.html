<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery — Jonathan Pamment</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f7;
      --surface: #ffffff;
      --text-primary: #1d1d1f;
      --text-secondary: #6e6e73;
      --text-tertiary: #aeaeb2;
      --accent: #0071e3;
      --radius: 14px;
    }

    html { -webkit-font-smoothing: antialiased; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
    }

    /* ── Nav bar ── */
    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(245,245,247,0.88);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid rgba(0,0,0,0.08);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 24px;
      height: 52px;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
    }

    .back-btn:hover { opacity: 0.75; }

    .nav-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-primary);
      text-align: center;
    }

    /* ── Page ── */
    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 24px 100px;
    }

    /* ── Empty state ── */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 80px 24px;
      color: var(--text-tertiary);
      text-align: center;
    }

    .empty p { font-size: 0.95rem; }

    /* ── Image wall ── */
    .image-wall {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 10px;
    }

    .wall-item {
      aspect-ratio: 1;
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
      background: var(--surface);
      cursor: pointer;
    }

    .wall-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.35s ease;
    }

    .wall-item:hover img { transform: scale(1.04); }

    /* ── Video wall item ── */
    .play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.18);
      transition: background 0.2s;
    }

    .wall-item.is-video:hover .play-overlay { background: rgba(0,0,0,0.35); }
    .wall-item.is-video:hover img { transform: scale(1.04); }

    .play-btn-icon {
      width: 54px;
      height: 54px;
      background: rgba(255,255,255,0.88);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
      transition: transform 0.2s;
    }

    .wall-item.is-video:hover .play-btn-icon { transform: scale(1.1); }

    /* ── Lightbox ── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    .lightbox.open { display: flex; }

    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      border-radius: 12px;
      object-fit: contain;
      box-shadow: 0 24px 80px rgba(0,0,0,0.6);
    }

    .lightbox video {
      max-width: 90vw;
      max-height: 90vh;
      border-radius: 12px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.6);
      display: none;
    }

    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 24px;
      background: rgba(255,255,255,0.12);
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      color: #fff;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }

    .lightbox-close:hover { background: rgba(255,255,255,0.22); }

    /* ── Nav arrows ── */
    .lightbox-prev,
    .lightbox-next {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.12);
      border: none;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      color: #fff;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }

    .lightbox-prev { left: 20px; }
    .lightbox-next { right: 20px; }
    .lightbox-prev:hover,
    .lightbox-next:hover { background: rgba(255,255,255,0.22); }

    @media (max-width: 600px) {
      .image-wall { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 6px; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="index.html" class="back-btn">
      <svg width="8" height="13" viewBox="0 0 8 13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M7 1L1 6.5 7 12"/>
      </svg>
      Back
    </a>
    <span class="nav-title" id="pageTitle"></span>
    <span></span>
  </nav>

  <main class="page">
    <div class="image-wall" id="imageWall"></div>
    <div class="empty" id="emptyState" style="display:none;">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      <p>No photos yet — check back soon.</p>
    </div>
  </main>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightboxClose">✕</button>
    <button class="lightbox-prev" id="lightboxPrev">&#8249;</button>
    <img id="lightboxImg" src="" alt="">
    <video id="lightboxVideo" controls playsinline preload="none"></video>
    <button class="lightbox-next" id="lightboxNext">&#8250;</button>
  </div>

  <script>
    // Items can be plain strings (images) or objects:
    // { type: 'video', thumb: 'images/thumb.jpg', src: 'images/clip.mov' }
    const configs = {
      motorcycling: {
        title: 'Adventure Motorcycling',
        items: [
          'images/motorcycling/motorcycling001.jpg',
          'images/motorcycling/motorcycling002.jpg',
          'images/motorcycling/motorcycling003.jpg',
          'images/motorcycling/motorcycling004.jpg',
          'images/motorcycling/motorcycling005.jpg',
          'images/motorcycling/motorcycling006.jpg',
          'images/motorcycling/motorcycling007.jpg',
          'images/motorcycling/motorcycling008.jpg',
          'images/motorcycling/motorcycling009.jpg',
          'images/motorcycling/motorcycling010.jpg',
          'images/motorcycling/motorcycling011.jpg',
          'images/motorcycling/motorcycling012.jpg',
          'images/motorcycling/motorcycling013.jpg',
          'images/motorcycling/motorcycling014.jpg',
          'images/motorcycling/motorcycling015.jpg',
          'images/motorcycling/motorcycling016.jpg',
          'images/motorcycling/motorcycling017.jpg',
          'images/motorcycling/motorcycling018.jpg'
        ]
      },
      paragliding: {
        title: 'Paragliding',
        items: [
          'images/paragliding/paragliding001.jpg',
          'images/paragliding/paragliding002.jpg',
          'images/paragliding/paragliding003.jpg',
          'images/paragliding/paragliding004.jpg',
          'images/paragliding/paragliding005.jpg',
          'images/paragliding/paragliding006.jpg',
          'images/paragliding/paragliding007.jpg',
          'images/paragliding/paragliding008.jpg',
          'images/paragliding/paragliding009.jpg',
          { type: 'video', thumb: 'images/paragliding/paragliding010_thumb.png', src: 'images/paragliding/paragliding010.mov' }
        ]
      }
    };

    const type = new URLSearchParams(window.location.search).get('type') || 'motorcycling';
    const cfg  = configs[type] || configs.motorcycling;

    document.title = cfg.title + ' — Jonathan Pamment';
    document.getElementById('pageTitle').textContent = cfg.title;

    const isVideo = item => typeof item === 'object' && item.type === 'video';

    /* ── Lightbox ── */
    const lightbox      = document.getElementById('lightbox');
    const lightboxImg   = document.getElementById('lightboxImg');
    const lightboxVideo = document.getElementById('lightboxVideo');
    const lightboxClose = document.getElementById('lightboxClose');
    const lightboxPrev  = document.getElementById('lightboxPrev');
    const lightboxNext  = document.getElementById('lightboxNext');
    let currentIndex    = 0;

    function stopVideo() {
      lightboxVideo.pause();
      lightboxVideo.removeAttribute('src');
      lightboxVideo.load();
    }

    function showItem(index) {
      stopVideo();
      currentIndex = index;
      const item = cfg.items[currentIndex];
      if (isVideo(item)) {
        lightboxImg.style.display = 'none';
        lightboxVideo.style.display = 'block';
        lightboxVideo.src = item.src;
        lightboxVideo.play().catch(() => {});
      } else {
        lightboxVideo.style.display = 'none';
        lightboxImg.style.display = 'block';
        lightboxImg.src = item;
      }
    }

    function openLightbox(index) {
      showItem(index);
      lightbox.classList.add('open');
    }

    function closeLightbox() {
      stopVideo();
      lightbox.classList.remove('open');
    }

    function showPrev() { showItem((currentIndex - 1 + cfg.items.length) % cfg.items.length); }
    function showNext() { showItem((currentIndex + 1) % cfg.items.length); }

    lightboxClose.addEventListener('click', closeLightbox);
    lightboxPrev.addEventListener('click', showPrev);
    lightboxNext.addEventListener('click', showNext);
    lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
    document.addEventListener('keydown', e => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape')      closeLightbox();
      if (e.key === 'ArrowLeft')   showPrev();
      if (e.key === 'ArrowRight')  showNext();
    });

    /* ── Render ── */
    const wall = document.getElementById('imageWall');

    if (cfg.items.length === 0) {
      document.getElementById('emptyState').style.display = 'flex';
    } else {
      cfg.items.forEach((item, i) => {
        const tile = document.createElement('div');
        tile.className = 'wall-item' + (isVideo(item) ? ' is-video' : '');

        const img = document.createElement('img');
        img.src = isVideo(item) ? item.thumb : item;
        img.loading = 'lazy';
        img.alt = '';
        tile.appendChild(img);

        if (isVideo(item)) {
          const overlay = document.createElement('div');
          overlay.className = 'play-overlay';
          overlay.innerHTML = `<div class="play-btn-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="#1d1d1f" style="margin-left:3px"><polygon points="5,3 19,12 5,21"/></svg>
          </div>`;
          tile.appendChild(overlay);
        }

        tile.addEventListener('click', () => openLightbox(i));
        wall.appendChild(tile);
      });
    }
  </script>
</body>
</html>
